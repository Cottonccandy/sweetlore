<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Lia Lorebook</title>

<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg, #ffb6f9, #a0c4ff);
  margin: 0;
}

.header {
  background: white;
  padding: 15px;
  text-align: center;
}

.section {
  padding: 15px;
}

.container {
  background: white;
  padding: 15px;
  border-radius: 15px;
  margin-bottom: 15px;
}

input, textarea, select {
  width: 100%;
  margin: 6px 0;
  padding: 8px;
  border-radius: 10px;
  border: 1px solid #ccc;
}

button {
  margin: 5px 3px;
  padding: 8px 12px;
  border: none;
  border-radius: 10px;
  background: #ff80bf;
  color: white;
  cursor: pointer;
}

.card {
  background: #fff0f8;
  padding: 10px;
  margin-top: 10px;
  border-radius: 10px;
}
</style>
</head>

<body>

<div class="header">
  <h2>🍭Lorebook Builder</h2>
  <input id="bookName" placeholder="ชื่อ Lorebook">
</div>

<div class="section">

<div class="container">
  <h3>➕ เพิ่ม Lore</h3>

  <input id="name" placeholder="Name (ไม่ใส่ก็ได้)">
  <input id="keys" placeholder="Keys (คั่นด้วย ,)">
  <textarea id="content" placeholder="Content"></textarea>

  <input id="order" type="number" value="100">

  <select id="position">
    <option value="before_char">Before Char</option>
    <option value="after_char">After Char</option>
    <option value="before_em">Before EM</option>
    <option value="after_em">After EM</option>
    <option value="before_an">Before AN</option>
    <option value="after_an">After AN</option>
  </select>

  <button onclick="addOrUpdate()">➕ เพิ่ม / แก้</button>
  <button onclick="exportJSON()">💾 Export</button>
  <button onclick="copyJSON()">📋 Copy</button>
  <input type="file" onchange="importJSON(event)">
</div>

<div class="container">
  <h3>📜 รายการ Lore</h3>
  <div id="list"></div>
</div>

</div>

<script>
let entries = [];
let editIndex = -1;

function addOrUpdate() {
  const name = document.getElementById("name").value || "";
  const keysRaw = document.getElementById("keys").value;
  const keys = keysRaw ? keysRaw.split(",").map(k => k.trim()) : [];
  const content = document.getElementById("content").value || "";
  const orderInput = document.getElementById("order").value;
  const order = orderInput ? parseInt(orderInput) : 100;
  const position = document.getElementById("position").value;

  const entry = {
    name,
    keys,
    content,
    order,
    position,
    enabled: true
  };

  if (editIndex >= 0) {
    entries[editIndex] = entry;
    editIndex = -1;
  } else {
    entries.push(entry);
  }

  clearForm();
  render();
}

function render() {
  const list = document.getElementById("list");
  list.innerHTML = "";

  entries.forEach((e, i) => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <b>${e.name || "(ไม่มีชื่อ)"}</b><br>
      Keys: ${e.keys.join(", ")}<br>
      Position: ${e.position}<br>
      Order: ${e.order}<br>
      <button onclick="editEntry(${i})">✏️ แก้</button>
      <button onclick="deleteEntry(${i})">🗑 ลบ</button>
    `;

    list.appendChild(div);
  });
}

function editEntry(i) {
  const e = entries[i];

  document.getElementById("name").value = e.name;
  document.getElementById("keys").value = e.keys.join(",");
  document.getElementById("content").value = e.content;
  document.getElementById("order").value = e.order;
  document.getElementById("position").value = e.position;

  editIndex = i;
}

function deleteEntry(i) {
  entries.splice(i, 1);
  render();
}

function clearForm() {
  document.getElementById("name").value = "";
  document.getElementById("keys").value = "";
  document.getElementById("content").value = "";
  document.getElementById("order").value = 100;
  editIndex = -1;
}

function exportJSON() {
  const bookName = document.getElementById("bookName").value || "Lorebook";

  if (entries.length === 0) {
    alert("ยังไม่มี lore!");
    return;
  }

  const data = {
    name: bookName,
    entries: entries
  };

  const blob = new Blob([JSON.stringify(data, null, 2)], {
    type: "application/json"
  });

  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = bookName + ".json";
  a.click();
}

function copyJSON() {
  const bookName = document.getElementById("bookName").value || "Lorebook";
  const data = JSON.stringify({ name: bookName, entries: entries }, null, 2);

  navigator.clipboard.writeText(data);
  alert("คัดลอกแล้ว!");
}

function importJSON(event) {
  const file = event.target.files[0];
  const reader = new FileReader();

  reader.onload = function(e) {
    const data = JSON.parse(e.target.result);
    entries = data.entries || [];
    document.getElementById("bookName").value = data.name || "";
    render();
  };

  reader.readAsText(file);
}
</script>

</body>
</html>
